name: CI/CD Eventra Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: "21"

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean compile -B --no-transfer-progress

      - name: Unit Tests
        run: mvn test -B --no-transfer-progress

      - name: Integration Tests
        run: mvn verify -B --no-transfer-progress
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Trigger Render Staging
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"
          else
            echo "RENDER_DEPLOY_HOOK_STAGING not configured yet"
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Production
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
          else
            echo "RENDER_DEPLOY_HOOK_PROD not configured yet"
          fi
