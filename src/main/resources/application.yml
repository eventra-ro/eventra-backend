spring:
  application:
    name: eventra-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ── DATABASE ────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventra}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ── FLYWAY ──────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # ── JACKSON ─────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── SERVER ────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ── JWT ───────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-32-characters-long}
  access-token-expiration: 900000       # 15 minute
  refresh-token-expiration: 604800000   # 7 zile

# ── CLOUDINARY ────────────────────────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# ── SENTRY ────────────────────────────────────────────────────
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.2
  environment: ${SPRING_PROFILES_ACTIVE:local}
  send-default-pii: false

# ── SPRINGDOC / SWAGGER ───────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: false

# ── ACTUATOR ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ── APP INFO ──────────────────────────────────────────────────
info:
  app:
    name: Eventra Backend
    version: 0.1.0
    description: Event planning hub REST API
